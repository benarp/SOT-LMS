version: 2
updates:
  # Web app (Next.js) dependencies
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch routine updates into one PR to cut noise; security fixes
      # still come through regardless of grouping.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Mobile app (Expo) dependencies
  - package-ecosystem: npm
    directory: /apps/mobile
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
